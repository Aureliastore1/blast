version: "3.9"

name: inaedaa-blast

services:
  postgres:
    image: postgres:16-alpine
    container_name: inaedaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inaedaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inaedaa_secret}
      POSTGRES_DB: ${POSTGRES_DB:-inaedaa_blast}
    ports:
      - "5432:5432"
    volumes:
      - inaedaa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inaedaa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inaedaa-net

  redis:
    image: redis:7-alpine
    container_name: inaedaa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - inaedaa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inaedaa-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: inaedaa-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-inaedaa}:${POSTGRES_PASSWORD:-inaedaa_secret}@postgres:5432/${POSTGRES_DB:-inaedaa_blast}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - inaedaa_uploads:/app/apps/api/uploads
      - inaedaa_sessions:/app/apps/api/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inaedaa-net

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: inaedaa-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - inaedaa-net

volumes:
  inaedaa_postgres_data:
  inaedaa_redis_data:
  inaedaa_uploads:
  inaedaa_sessions:

networks:
  inaedaa-net:
    driver: bridge
